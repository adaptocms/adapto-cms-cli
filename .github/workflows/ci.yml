name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    # Pushes to main/develop already run CI; skip the duplicate pull_request run.
    if: github.event_name != 'pull_request' || (github.head_ref != 'main' && github.head_ref != 'develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test
      - run: make check-docs

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)

          case "$HEAD_MSG" in
            *"[release major]"*) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            *"[release minor]"*) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Releasing ${NEXT} (previous: ${LATEST})"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT"
          git push origin "$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

  # GITHUB_TOKEN tag pushes don't trigger tag-push workflows, so call Release directly.
  release:
    needs: tag
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.tag.outputs.version }}
